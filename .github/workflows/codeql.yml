name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"

jobs:
  analyze:
    permissions:
      actions: read
      contents: read
      security-events: write

    uses: github/codeql-action/.github/workflows/codeql.yml@v4
    with:
      languages: javascript-typescript
